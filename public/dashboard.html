<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Movacamper Analytics</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
      min-height: 100vh;
    }
    @media (min-width: 768px) { body { padding: 32px 40px; } }

    /* Header */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
    }
    .header h1 { font-size: 1.4rem; font-weight: 700; color: #f8fafc; }
    .header h1 span { color: #38bdf8; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .last-updated { font-size: 0.7rem; color: #475569; }
    .period-select { display: flex; gap: 6px; }
    .period-btn {
      background: #1e293b; color: #94a3b8; border: 1px solid #334155;
      padding: 5px 12px; border-radius: 6px; cursor: pointer;
      font-size: 0.8rem; font-family: inherit; transition: all 0.15s;
    }
    .period-btn.active, .period-btn:hover {
      background: #38bdf8; color: #0f172a; border-color: #38bdf8; font-weight: 600;
    }

    /* Insights banner */
    .insights-banner {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 1px solid #334155; border-radius: 12px;
      padding: 20px 24px; margin-bottom: 24px;
    }
    .insights-banner h2 {
      font-size: 0.85rem; font-weight: 600; color: #94a3b8;
      margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .insight-items { display: flex; flex-wrap: wrap; gap: 12px; }
    .insight-item {
      display: flex; align-items: center; gap: 8px;
      background: #0f172a; border: 1px solid #1e293b; border-radius: 8px;
      padding: 10px 16px; font-size: 0.82rem; flex: 1; min-width: 200px;
    }
    .insight-icon { font-size: 1.3rem; flex-shrink: 0; }
    .insight-text { color: #cbd5e1; line-height: 1.4; }
    .insight-text strong { color: #f8fafc; }
    .insight-good { border-color: #166534; }
    .insight-warn { border-color: #854d0e; }
    .insight-info { border-color: #1e40af; }
    .insight-bad { border-color: #991b1b; }

    /* KPI cards */
    .kpi-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px; margin-bottom: 24px;
    }
    .kpi-card {
      background: #1e293b; border: 1px solid #334155; border-radius: 12px;
      padding: 16px 18px; position: relative; overflow: hidden;
    }
    .kpi-value {
      font-size: 1.8rem; font-weight: 800; color: #f8fafc; line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .kpi-label {
      font-size: 0.68rem; color: #64748b; text-transform: uppercase;
      letter-spacing: 0.08em; margin-top: 4px;
    }
    .kpi-trend {
      position: absolute; top: 12px; right: 14px;
      font-size: 0.7rem; font-weight: 600; padding: 2px 7px;
      border-radius: 4px;
    }
    .kpi-trend.up { background: #052e16; color: #4ade80; }
    .kpi-trend.down { background: #450a0a; color: #f87171; }
    .kpi-trend.flat { background: #1e293b; color: #64748b; }
    .kpi-trend.new { background: #172554; color: #60a5fa; }
    .kpi-card.accent-blue .kpi-value { color: #38bdf8; }
    .kpi-card.accent-green .kpi-value { color: #4ade80; }
    .kpi-card.accent-amber .kpi-value { color: #fbbf24; }
    .kpi-card.accent-purple .kpi-value { color: #a78bfa; }
    .kpi-sparkline {
      position: absolute; bottom: 0; left: 0; right: 0; height: 32px; opacity: 0.15;
    }

    /* Charts row */
    .charts-row {
      display: grid; grid-template-columns: 2fr 1fr;
      gap: 16px; margin-bottom: 24px;
    }
    @media (max-width: 900px) { .charts-row { grid-template-columns: 1fr; } }

    .chart-card {
      background: #1e293b; border: 1px solid #334155; border-radius: 12px;
      padding: 20px;
    }
    .chart-card h2 {
      font-size: 0.85rem; font-weight: 600; color: #94a3b8; margin-bottom: 14px;
    }
    .chart-container { width: 100%; height: 240px; position: relative; }
    .chart-container-sm { width: 100%; height: 200px; position: relative; }
    canvas { width: 100% !important; height: 100% !important; }

    /* Funnel */
    .funnel-card {
      background: #1e293b; border: 1px solid #334155; border-radius: 12px;
      padding: 20px; margin-bottom: 24px;
    }
    .funnel-card h2 {
      font-size: 0.85rem; font-weight: 600; color: #94a3b8; margin-bottom: 16px;
    }
    .funnel {
      display: flex; align-items: center; justify-content: center;
      gap: 0; flex-wrap: wrap;
    }
    .funnel-step {
      text-align: center; flex: 1; min-width: 100px; padding: 16px 8px;
      position: relative;
    }
    .funnel-step-value {
      font-size: 1.6rem; font-weight: 800; color: #f8fafc;
      font-variant-numeric: tabular-nums;
    }
    .funnel-step-label {
      font-size: 0.7rem; color: #64748b; text-transform: uppercase;
      letter-spacing: 0.05em; margin-top: 4px;
    }
    .funnel-step-bar {
      margin: 10px auto 0; border-radius: 4px; height: 6px;
      transition: width 0.5s;
    }
    .funnel-arrow {
      color: #334155; font-size: 1.2rem; padding: 0 4px;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .funnel-arrow-rate {
      font-size: 0.65rem; font-weight: 600; color: #64748b;
      font-variant-numeric: tabular-nums;
    }

    /* Tables */
    .tables-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px; margin-bottom: 24px;
    }
    .table-card {
      background: #1e293b; border: 1px solid #334155; border-radius: 12px;
      padding: 18px;
    }
    .table-card h2 {
      font-size: 0.85rem; font-weight: 600; margin-bottom: 12px; color: #94a3b8;
    }
    .stat-row {
      display: flex; align-items: center; padding: 7px 0;
      border-bottom: 1px solid rgba(51, 65, 85, 0.4);
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-rank {
      width: 20px; font-size: 0.7rem; color: #475569;
      font-weight: 600; flex-shrink: 0;
    }
    .stat-bar-bg {
      flex: 1; height: 24px; background: #0f172a; border-radius: 4px;
      position: relative; overflow: hidden; margin: 0 10px;
    }
    .stat-bar-fill {
      height: 100%; border-radius: 4px; position: absolute; left: 0; top: 0;
      transition: width 0.4s;
    }
    .stat-bar-label {
      position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
      font-size: 0.75rem; color: #e2e8f0; font-weight: 500;
      white-space: nowrap; z-index: 1;
    }
    .stat-count {
      font-size: 0.8rem; color: #94a3b8; font-weight: 600;
      font-variant-numeric: tabular-nums; min-width: 32px; text-align: right;
    }

    .empty-state {
      text-align: center; padding: 60px 20px; color: #475569;
    }
    .empty-state h2 { color: #64748b; margin-bottom: 12px; }

    .loading {
      text-align: center; padding: 80px 20px; color: #475569; font-size: 1rem;
    }
    .loading .spinner {
      display: inline-block; width: 28px; height: 28px;
      border: 3px solid #334155; border-top-color: #38bdf8;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin-bottom: 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      text-align: center; color: #1e293b; font-size: 0.7rem; margin-top: 32px;
      padding: 16px;
    }
    .footer a { color: #334155; text-decoration: none; }
  </style>
</head>
<body>

<div class="header">
  <h1>Mova<span>camper</span> Analytics</h1>
  <div class="header-right">
    <span class="last-updated" id="lastUpdated"></span>
    <div class="period-select">
      <button class="period-btn" data-days="7">7d</button>
      <button class="period-btn active" data-days="14">14d</button>
      <button class="period-btn" data-days="30">30d</button>
      <button class="period-btn" data-days="90">90d</button>
    </div>
  </div>
</div>

<div id="content">
  <div class="loading"><div class="spinner"></div><div>Loading analytics...</div></div>
</div>

<div class="footer">
  Movacamper Internal Dashboard &middot; <a href="/">Back to site</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script>
const TOKEN = 'movacamper-stats-2026';
let currentDays = 14;
let charts = {};

document.querySelectorAll('.period-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentDays = parseInt(btn.dataset.days);
    loadDashboard(currentDays);
  });
});

// Auto-exclude dashboard visitors from tracking
try { localStorage.setItem('movacamper_notrack', '1'); } catch(e) {}

async function loadDashboard(days) {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div><div>Loading analytics...</div></div>';

  try {
    const res = await fetch(`/api/stats?token=${TOKEN}&days=${days}`);
    const data = await res.json();
    if (data.error && !data.totals) {
      content.innerHTML = `<div class="empty-state"><h2>No data yet</h2><p>${data.error}</p></div>`;
      return;
    }
    document.getElementById('lastUpdated').textContent =
      'Updated ' + new Date(data.generated_at).toLocaleTimeString('en', { hour: '2-digit', minute: '2-digit' });
    renderDashboard(data);
  } catch (err) {
    content.innerHTML = `<div class="empty-state"><h2>Error</h2><p>${err.message}</p></div>`;
  }
}

// ─── TREND CALC ───
function calcTrend(timeseries, key) {
  if (timeseries.length < 4) return { pct: 0, cls: 'flat', label: '—' };
  const half = Math.floor(timeseries.length / 2);
  const first = timeseries.slice(0, half).reduce((s, d) => s + (d[key] || 0), 0);
  const second = timeseries.slice(half).reduce((s, d) => s + (d[key] || 0), 0);
  if (first === 0 && second === 0) return { pct: 0, cls: 'flat', label: '—' };
  if (first === 0) return { pct: 100, cls: 'new', label: 'new' };
  const pct = Math.round(((second - first) / first) * 100);
  if (pct > 5) return { pct, cls: 'up', label: `+${pct}%` };
  if (pct < -5) return { pct, cls: 'down', label: `${pct}%` };
  return { pct: 0, cls: 'flat', label: 'stable' };
}

// ─── INSIGHTS ENGINE ───
function generateInsights(data) {
  const { totals, timeseries, top_referrers, top_search_cities } = data;
  const insights = [];
  const days = timeseries.length;

  // Traffic trend
  const visTrend = calcTrend(timeseries, 'visitors');
  if (visTrend.cls === 'up') {
    insights.push({ icon: '📈', text: `Traffic is <strong>growing ${visTrend.label}</strong> — keep pushing content and SEO.`, type: 'good' });
  } else if (visTrend.cls === 'down') {
    insights.push({ icon: '📉', text: `Traffic is <strong>down ${visTrend.label}</strong> — consider promoting on Reddit or social media.`, type: 'warn' });
  } else if (totals.visitors === 0) {
    insights.push({ icon: '🚀', text: `<strong>No visitors yet</strong> — tracking just started. Data will build up automatically.`, type: 'info' });
  }

  // Conversion rate
  if (totals.visitors > 0 && totals.searches > 0) {
    const searchRate = Math.round((totals.searches / totals.visitors) * 100);
    if (searchRate > 50) {
      insights.push({ icon: '🎯', text: `<strong>${searchRate}%</strong> of visitors search — excellent engagement!`, type: 'good' });
    } else if (searchRate > 20) {
      insights.push({ icon: '🔍', text: `<strong>${searchRate}%</strong> of visitors search — solid conversion.`, type: 'info' });
    } else {
      insights.push({ icon: '⚡', text: `Only <strong>${searchRate}%</strong> search — try making the search bar more prominent.`, type: 'warn' });
    }
  }

  // Subscriber conversion
  if (totals.subscribes > 0) {
    insights.push({ icon: '🔔', text: `<strong>${totals.subscribes} new subscriber${totals.subscribes > 1 ? 's' : ''}</strong> this period — the alerts feature is working.`, type: 'good' });
  } else if (totals.visitors > 20 && totals.subscribes === 0) {
    insights.push({ icon: '💡', text: `<strong>0 new subscribers</strong> despite ${totals.visitors} visitors — consider A/B testing the subscribe CTA.`, type: 'warn' });
  }

  // Top referrer
  if (top_referrers.length > 0 && top_referrers[0].source !== 'direct') {
    insights.push({ icon: '🌐', text: `Top traffic source: <strong>${top_referrers[0].source}</strong> (${top_referrers[0].count} visits).`, type: 'info' });
  } else if (top_referrers.length > 0 && top_referrers[0].source === 'direct') {
    insights.push({ icon: '📱', text: `Most traffic is <strong>direct</strong> — try building organic/referral channels.`, type: 'warn' });
  }

  // Top city
  if (top_search_cities.length > 0) {
    insights.push({ icon: '🏙️', text: `Most searched city: <strong>${top_search_cities[0].city}</strong> (${top_search_cities[0].count}x). Make sure deals from there are fresh.`, type: 'info' });
  }

  // Pages per visitor (bounce-like)
  if (totals.avg_pages_per_visitor >= 2) {
    insights.push({ icon: '✅', text: `<strong>${totals.avg_pages_per_visitor} pages/visit</strong> — visitors are exploring. Low bounce rate!`, type: 'good' });
  } else if (totals.avg_pages_per_visitor > 0 && totals.avg_pages_per_visitor < 1.3) {
    insights.push({ icon: '🚪', text: `<strong>${totals.avg_pages_per_visitor} pages/visit</strong> — high bounce. Add more internal links and CTAs.`, type: 'bad' });
  }

  return insights.slice(0, 4); // max 4
}

// ─── SPARKLINE ───
function miniSparkSVG(data, color) {
  if (!data || data.length < 2) return '';
  const max = Math.max(...data, 1);
  const w = 200, h = 32;
  const points = data.map((v, i) => `${(i / (data.length - 1)) * w},${h - (v / max) * h}`).join(' ');
  return `<svg class="kpi-sparkline" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polyline points="${points}" fill="none" stroke="${color}" stroke-width="2"/>
    <polygon points="0,${h} ${points} ${w},${h}" fill="${color}" opacity="0.3"/>
  </svg>`;
}

// ─── RENDER ───
const COUNTRY_NAMES = {
  NL:'Netherlands',DE:'Germany',ES:'Spain',FR:'France',IT:'Italy',US:'United States',
  GB:'United Kingdom',BE:'Belgium',CH:'Switzerland',AT:'Austria',PT:'Portugal',
  BR:'Brazil',CA:'Canada',IE:'Ireland',RO:'Romania',HU:'Hungary',SI:'Slovenia',
  AD:'Andorra',FI:'Finland',IS:'Iceland',SE:'Sweden',DK:'Denmark',NO:'Norway',

  SK:'Slovakia',UA:'Ukraine',TR:'Turkey',AU:'Australia',NZ:'New Zealand',
  IN:'India',JP:'Japan',KR:'South Korea',MX:'Mexico',AR:'Argentina',CL:'Chile',

};

  NL:'🇳🇱',DE:'🇩🇪',ES:'🇪🇸',FR:'🇫🇷',IT:'🇮🇹',US:'🇺🇸',GB:'🇬🇧',BE:'🇧🇪',
  CH:'🇨🇭',AT:'🇦🇹',PT:'🇵🇹',BR:'🇧🇷',CA:'🇨🇦',IE:'🇮🇪',RO:'🇷🇴',HU:'🇭🇺',
  SI:'🇸🇮',AD:'🇦🇩',FI:'🇫🇮',IS:'🇮🇸',SE:'🇸🇪',DK:'🇩🇰',NO:'🇳🇴',PL:'🇵🇱',
  CZ:'🇨🇿',GR:'🇬🇷',HR:'🇭🇷',BG:'🇧🇬',RS:'🇷🇸',SK:'🇸🇰',UA:'🇺🇦',TR:'🇹🇷',
  AU:'🇦🇺',NZ:'🇳🇿',IN:'🇮🇳',JP:'🇯🇵',KR:'🇰🇷',MX:'🇲🇽',AR:'🇦🇷',CL:'🇨🇱',
  ZA:'🇿🇦',IL:'🇮🇱',AE:'🇦🇪',SG:'🇸🇬',TH:'🇹🇭',
};

function renderDashboard(data) {
  const { totals, timeseries, top_referrers, top_pages, top_search_cities, countries, devices } = data;
  const content = document.getElementById('content');
  const hasData = totals.pageviews > 0 || totals.searches > 0;

  // Trends
  const tVis = calcTrend(timeseries, 'visitors');
  const tPV = calcTrend(timeseries, 'pageviews');
  const tSearch = calcTrend(timeseries, 'searches');
  const tSub = calcTrend(timeseries, 'subscribes');

  // Sparkline data
  const visData = timeseries.map(d => d.visitors);
  const pvData = timeseries.map(d => d.pageviews);
  const searchData = timeseries.map(d => d.searches);

  // Funnel rates
  const searchRate = totals.visitors > 0 ? Math.round((totals.searches / totals.visitors) * 100) : 0;
  const subRate = totals.searches > 0 ? Math.round((totals.subscribes / totals.searches) * 100) : 0;

  // Insights
  const insights = generateInsights(data);

  content.innerHTML = `
    <!-- Insights Banner -->
    ${insights.length > 0 ? `
    <div class="insights-banner">
      <h2>Key Insights</h2>
      <div class="insight-items">
        ${insights.map(i => `
          <div class="insight-item insight-${i.type}">
            <span class="insight-icon">${i.icon}</span>
            <span class="insight-text">${i.text}</span>
          </div>
        `).join('')}
      </div>
    </div>` : ''}

    <!-- KPI Cards -->
    <div class="kpi-grid">
      <div class="kpi-card accent-blue">
        <span class="kpi-trend ${tVis.cls}">${tVis.label}</span>
        <div class="kpi-value">${totals.visitors.toLocaleString()}</div>
        <div class="kpi-label">Visitors</div>
        ${miniSparkSVG(visData, '#38bdf8')}
      </div>
      <div class="kpi-card">
        <span class="kpi-trend ${tPV.cls}">${tPV.label}</span>
        <div class="kpi-value">${totals.pageviews.toLocaleString()}</div>
        <div class="kpi-label">Pageviews</div>
        ${miniSparkSVG(pvData, '#94a3b8')}
      </div>
      <div class="kpi-card accent-green">
        <span class="kpi-trend ${tSearch.cls}">${tSearch.label}</span>
        <div class="kpi-value">${totals.searches.toLocaleString()}</div>
        <div class="kpi-label">Searches</div>
        ${miniSparkSVG(searchData, '#4ade80')}
      </div>
      <div class="kpi-card accent-amber">
        <div class="kpi-value">${totals.avg_pages_per_visitor}</div>
        <div class="kpi-label">Pages / Visit</div>
      </div>
      <div class="kpi-card accent-purple">
        <div class="kpi-value">${totals.subscribers_total}</div>
        <div class="kpi-label">Subscribers</div>
      </div>
      <div class="kpi-card accent-green">
        <span class="kpi-trend ${tSub.cls}">${tSub.label}</span>
        <div class="kpi-value">${totals.subscribes}</div>
        <div class="kpi-label">New Subs</div>
      </div>
    </div>

    ${hasData ? `
    <!-- Conversion Funnel -->
    <div class="funnel-card">
      <h2>Conversion Funnel</h2>
      <div class="funnel">
        <div class="funnel-step">
          <div class="funnel-step-value" style="color:#38bdf8">${totals.visitors}</div>
          <div class="funnel-step-label">Visitors</div>
          <div class="funnel-step-bar" style="width:100%;background:#38bdf8"></div>
        </div>
        <div class="funnel-arrow">
          <span>→</span>
          <span class="funnel-arrow-rate">${searchRate}%</span>
        </div>
        <div class="funnel-step">
          <div class="funnel-step-value" style="color:#4ade80">${totals.searches}</div>
          <div class="funnel-step-label">Searches</div>
          <div class="funnel-step-bar" style="width:${Math.max(searchRate, 5)}%;background:#4ade80"></div>
        </div>
        <div class="funnel-arrow">
          <span>→</span>
          <span class="funnel-arrow-rate">${subRate}%</span>
        </div>
        <div class="funnel-step">
          <div class="funnel-step-value" style="color:#a78bfa">${totals.subscribes}</div>
          <div class="funnel-step-label">Subscribers</div>
          <div class="funnel-step-bar" style="width:${Math.max(subRate, 3)}%;background:#a78bfa"></div>
        </div>
      </div>
    </div>

    <!-- Charts Row -->
    <div class="charts-row">
      <div class="chart-card">
        <h2>Daily Traffic</h2>
        <div class="chart-container"><canvas id="trafficChart"></canvas></div>
      </div>
      <div class="chart-card">
        <h2>Traffic Sources</h2>
        <div class="chart-container-sm"><canvas id="referrerChart"></canvas></div>
      </div>
    </div>

    <!-- Tables -->
    <div class="tables-grid">
      <div class="table-card">
        <h2>Top Pages</h2>
        ${renderBarTable(top_pages, 'path', 'count', '#38bdf8')}
      </div>
      <div class="table-card">
        <h2>Top Referrers</h2>
        ${renderBarTable(top_referrers, 'source', 'count', '#a78bfa')}
      </div>
      <div class="table-card">
        <h2>Top Search Cities</h2>
        ${top_search_cities && top_search_cities.length > 0
          ? renderBarTable(top_search_cities, 'city', 'count', '#4ade80')
          : '<div style="color:#475569;font-size:0.8rem;padding:12px 0">Data starts collecting from now</div>'
        }
      </div>
    </div>

    <!-- Countries & Devices -->
    <div class="charts-row">
      <div class="chart-card">
        <h2>Countries</h2>
        ${countries && countries.length > 0 ? renderCountryTable(countries) : '<div style="color:#475569;font-size:0.8rem">No data</div>'}
      </div>
      <div class="chart-card">
        <h2>Devices</h2>
        <div class="chart-container-sm"><canvas id="deviceChart"></canvas></div>
      </div>
    </div>
    ` : `
    <div class="empty-state">
      <h2>Tracking is active 🎯</h2>
      <p>Data will appear here once visitors start coming in.<br>Check back tomorrow for your first daily report.</p>
    </div>
    `}
  `;

  if (hasData) {
    renderTrafficChart(timeseries);
    renderReferrerChart(top_referrers);
    if (devices && devices.length > 0) renderDeviceChart(devices);
  }
}

function renderCountryTable(countries) {
  if (!countries || countries.length === 0) return '';
  const maxVal = Math.max(...countries.map(c => c.count));
  return countries.slice(0, 10).map((c, i) => {
    const pct = Math.max(8, (c.count / maxVal) * 100);
    const flag = COUNTRY_FLAGS[c.country] || '🌍';
    const name = COUNTRY_NAMES[c.country] || c.country;
    return `<div class="stat-row">
      <span class="stat-rank">${flag}</span>
      <div class="stat-bar-bg">
        <div class="stat-bar-fill" style="width:${pct}%;background:#fbbf24;opacity:0.2"></div>
        <span class="stat-bar-label">${name}</span>
      </div>
      <span class="stat-count">${c.count}</span>
    </div>`;
  }).join('');
}

function renderBarTable(items, labelKey, valueKey, color) {
  if (!items || items.length === 0) {
    return '<div style="color:#475569;font-size:0.8rem;padding:12px 0">No data yet</div>';
  }
  const maxVal = Math.max(...items.map(i => i[valueKey]));
  return items.slice(0, 8).map((item, i) => {
    const pct = Math.max(8, (item[valueKey] / maxVal) * 100);
    return `<div class="stat-row">
      <span class="stat-rank">${i + 1}</span>
      <div class="stat-bar-bg">
        <div class="stat-bar-fill" style="width:${pct}%;background:${color};opacity:0.2"></div>
        <span class="stat-bar-label">${item[labelKey]}</span>
      </div>
      <span class="stat-count">${item[valueKey].toLocaleString()}</span>
    </div>`;
  }).join('');
}

function renderTrafficChart(timeseries) {
  if (charts.traffic) charts.traffic.destroy();
  const ctx = document.getElementById('trafficChart').getContext('2d');
  const labels = timeseries.map(d => {
    const p = d.date.split('-');
    return `${p[2]}/${p[1]}`;
  });

  charts.traffic = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Visitors', data: timeseries.map(d => d.visitors),
          borderColor: '#38bdf8', backgroundColor: 'rgba(56,189,248,0.08)',
          fill: true, tension: 0.35, pointRadius: 3, pointHoverRadius: 5,
          borderWidth: 2.5, pointBackgroundColor: '#38bdf8',
        },
        {
          label: 'Pageviews', data: timeseries.map(d => d.pageviews),
          borderColor: '#64748b', backgroundColor: 'transparent',
          tension: 0.35, pointRadius: 2, borderWidth: 1.5, borderDash: [5, 3],
        },
        {
          label: 'Searches', data: timeseries.map(d => d.searches),
          borderColor: '#4ade80', backgroundColor: 'rgba(74,222,128,0.05)',
          fill: true, tension: 0.35, pointRadius: 3, pointHoverRadius: 5,
          borderWidth: 2, pointBackgroundColor: '#4ade80',
        },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: { labels: { color: '#64748b', font: { size: 11, family: 'Inter' }, padding: 16, usePointStyle: true, pointStyle: 'circle' } },
        tooltip: {
          backgroundColor: '#1e293b', titleColor: '#f8fafc', bodyColor: '#cbd5e1',
          borderColor: '#334155', borderWidth: 1, padding: 12,
          titleFont: { family: 'Inter', weight: '600' }, bodyFont: { family: 'Inter' },
        }
      },
      scales: {
        x: { grid: { color: 'rgba(30,41,59,0.5)' }, ticks: { color: '#475569', font: { size: 10, family: 'Inter' }, maxRotation: 0 } },
        y: { beginAtZero: true, grid: { color: 'rgba(30,41,59,0.5)' }, ticks: { color: '#475569', font: { size: 10, family: 'Inter' } } }
      }
    }
  });
}

function renderReferrerChart(referrers) {
  if (charts.referrer) charts.referrer.destroy();
  if (!referrers || referrers.length === 0) return;

  const ctx = document.getElementById('referrerChart').getContext('2d');
  const colors = ['#38bdf8', '#4ade80', '#a78bfa', '#fbbf24', '#f87171', '#2dd4bf', '#fb923c', '#e879f9'];
  const top = referrers.slice(0, 6);

  charts.referrer = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: top.map(r => r.source),
      datasets: [{
        data: top.map(r => r.count),
        backgroundColor: colors.slice(0, top.length),
        borderColor: '#1e293b', borderWidth: 3, hoverBorderWidth: 0,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '65%',
      plugins: {
        legend: {
          position: 'bottom',
          labels: { color: '#94a3b8', font: { size: 10, family: 'Inter' }, padding: 8, usePointStyle: true, pointStyle: 'circle' }
        },
        tooltip: {
          backgroundColor: '#1e293b', titleColor: '#f8fafc', bodyColor: '#cbd5e1',
          borderColor: '#334155', borderWidth: 1,
        }
      }
    }
  });
}

function renderDeviceChart(devices) {
  if (charts.device) charts.device.destroy();
  const el = document.getElementById('deviceChart');
  if (!el) return;
  const ctx = el.getContext('2d');
  const colors = { mobile: '#38bdf8', desktop: '#a78bfa', tablet: '#fbbf24' };

  charts.device = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: devices.map(d => d.type),
      datasets: [{
        data: devices.map(d => d.count),
        backgroundColor: devices.map(d => colors[d.type] || '#64748b'),
        borderColor: '#1e293b', borderWidth: 3,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '65%',
      plugins: {
        legend: {
          position: 'bottom',
          labels: { color: '#94a3b8', font: { size: 11, family: 'Inter' }, padding: 10, usePointStyle: true, pointStyle: 'circle' }
        },
      }
    }
  });
}

loadDashboard(currentDays);
</script>
</body>
</html>
