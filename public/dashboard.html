<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Movacamper + Relocamp Analytics</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
      min-height: 100vh;
    }
    @media (min-width: 768px) { body { padding: 32px 40px; } }

    /* Header */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
    }
    .header h1 { font-size: 1.4rem; font-weight: 700; color: #f8fafc; }
    .header h1 span { color: #38bdf8; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .last-updated { font-size: 0.7rem; color: #475569; }
    .period-select { display: flex; gap: 6px; }
    .period-btn {
      background: #1e293b; color: #94a3b8; border: 1px solid #334155;
      padding: 5px 12px; border-radius: 6px; cursor: pointer;
      font-size: 0.8rem; font-family: inherit; transition: all 0.15s;
    }
    .period-btn.active, .period-btn:hover {
      background: #38bdf8; color: #0f172a; border-color: #38bdf8; font-weight: 600;
    }

    /* Insights banner */
    .insights-banner {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 1px solid #334155; border-radius: 12px;
      padding: 20px 24px; margin-bottom: 24px;
    }
    .insights-banner h2 {
      font-size: 0.85rem; font-weight: 600; color: #94a3b8;
      margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .insight-items { display: flex; flex-wrap: wrap; gap: 12px; }
    .insight-item {
      display: flex; align-items: center; gap: 8px;
      background: #0f172a; border: 1px solid #1e293b; border-radius: 8px;
      padding: 10px 16px; font-size: 0.82rem; flex: 1; min-width: 200px;
    }
    .insight-icon { font-size: 1.3rem; flex-shrink: 0; }
    .insight-text { color: #cbd5e1; line-height: 1.4; }
    .insight-text strong { color: #f8fafc; }
    .insight-good { border-color: #166534; }
    .insight-warn { border-color: #854d0e; }
    .insight-info { border-color: #1e40af; }
    .insight-bad { border-color: #991b1b; }

    /* KPI cards */
    .kpi-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px; margin-bottom: 24px;
    }
    .kpi-card {
      background: #1e293b; border: 1px solid #334155; border-radius: 12px;
      padding: 16px 18px; position: relative; overflow: hidden;
    }
    .kpi-value {
      font-size: 1.8rem; font-weight: 800; color: #f8fafc; line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .kpi-label {
      font-size: 0.68rem; color: #64748b; text-transform: uppercase;
      letter-spacing: 0.08em; margin-top: 4px;
    }
    .kpi-trend {
      position: absolute; top: 12px; right: 14px;
      font-size: 0.7rem; font-weight: 600; padding: 2px 7px;
      border-radius: 4px;
    }
    .kpi-trend.up { background: #052e16; color: #4ade80; }
    .kpi-trend.down { background: #450a0a; color: #f87171; }
    .kpi-trend.flat { background: #1e293b; color: #64748b; }
    .kpi-trend.new { background: #172554; color: #60a5fa; }
    .kpi-card.accent-blue .kpi-value { color: #38bdf8; }
    .kpi-card.accent-green .kpi-value { color: #4ade80; }
    .kpi-card.accent-amber .kpi-value { color: #fbbf24; }
    .kpi-card.accent-purple .kpi-value { color: #a78bfa; }
    .kpi-sparkline {
      position: absolute; bottom: 0; left: 0; right: 0; height: 32px; opacity: 0.15;
    }

    /* Charts row */
    .charts-row {
      display: grid; grid-template-columns: 2fr 1fr;
      gap: 16px; margin-bottom: 24px;
    }
    @media (max-width: 900px) { .charts-row { grid-template-columns: 1fr; } }

    .chart-card {
      background: #1e293b; border: 1px solid #334155; border-radius: 12px;
      padding: 20px;
    }
    .chart-card h2 {
      font-size: 0.85rem; font-weight: 600; color: #94a3b8; margin-bottom: 14px;
    }
    .chart-container { width: 100%; height: 240px; position: relative; }
    .chart-container-sm { width: 100%; height: 200px; position: relative; }
    canvas { width: 100% !important; height: 100% !important; }

    /* Funnel */
    .funnel-card {
      background: #1e293b; border: 1px solid #334155; border-radius: 12px;
      padding: 20px; margin-bottom: 24px;
    }
    .funnel-card h2 {
      font-size: 0.85rem; font-weight: 600; color: #94a3b8; margin-bottom: 16px;
    }
    .funnel {
      display: flex; align-items: center; justify-content: center;
      gap: 0; flex-wrap: wrap;
    }
    .funnel-step {
      text-align: center; flex: 1; min-width: 100px; padding: 16px 8px;
      position: relative;
    }
    .funnel-step-value {
      font-size: 1.6rem; font-weight: 800; color: #f8fafc;
      font-variant-numeric: tabular-nums;
    }
    .funnel-step-label {
      font-size: 0.7rem; color: #64748b; text-transform: uppercase;
      letter-spacing: 0.05em; margin-top: 4px;
    }
    .funnel-step-bar {
      margin: 10px auto 0; border-radius: 4px; height: 6px;
      transition: width 0.5s;
    }
    .funnel-arrow {
      color: #334155; font-size: 1.2rem; padding: 0 4px;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .funnel-arrow-rate {
      font-size: 0.65rem; font-weight: 600; color: #64748b;
      font-variant-numeric: tabular-nums;
    }

    /* Tables */
    .tables-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px; margin-bottom: 24px;
    }
    .table-card {
      background: #1e293b; border: 1px solid #334155; border-radius: 12px;
      padding: 18px;
    }
    .table-card h2 {
      font-size: 0.85rem; font-weight: 600; margin-bottom: 12px; color: #94a3b8;
    }
    .stat-row {
      display: flex; align-items: center; padding: 7px 0;
      border-bottom: 1px solid rgba(51, 65, 85, 0.4);
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-rank {
      width: 20px; font-size: 0.7rem; color: #475569;
      font-weight: 600; flex-shrink: 0;
    }
    .stat-bar-bg {
      flex: 1; height: 24px; background: #0f172a; border-radius: 4px;
      position: relative; overflow: hidden; margin: 0 10px;
    }
    .stat-bar-fill {
      height: 100%; border-radius: 4px; position: absolute; left: 0; top: 0;
      transition: width 0.4s;
    }
    .stat-bar-label {
      position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
      font-size: 0.75rem; color: #e2e8f0; font-weight: 500;
      white-space: nowrap; z-index: 1;
    }
    .stat-count {
      font-size: 0.8rem; color: #94a3b8; font-weight: 600;
      font-variant-numeric: tabular-nums; min-width: 32px; text-align: right;
    }

    /* Section headers */
    .section-header {
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: #475569; margin-bottom: 10px; margin-top: 8px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-header .dot {
      width: 8px; height: 8px; border-radius: 50%; display: inline-block;
    }
    .section-header .dot-blue { background: #38bdf8; }
    .section-header .dot-green { background: #4ade80; }
    .section-header .dot-orange { background: #fb923c; }

    /* Subscribers */
    .subs-card {
      background: #1e293b; border: 1px solid #334155; border-radius: 12px;
      padding: 20px; margin-bottom: 24px;
    }
    .subs-card h2 {
      font-size: 0.85rem; font-weight: 600; color: #94a3b8; margin-bottom: 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .subs-card h2 .badge {
      background: #a78bfa; color: #0f172a; font-size: 0.7rem; font-weight: 700;
      padding: 2px 8px; border-radius: 10px;
    }
    .sub-item {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 14px 0; border-bottom: 1px solid rgba(51, 65, 85, 0.4);
    }
    .sub-item:last-child { border-bottom: none; }
    .sub-avatar {
      width: 36px; height: 36px; border-radius: 50%; background: #334155;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; flex-shrink: 0; color: #a78bfa; font-weight: 700;
    }
    .sub-info { flex: 1; min-width: 0; }
    .sub-email { font-size: 0.85rem; font-weight: 600; color: #f8fafc; word-break: break-all; }
    .sub-wants {
      font-size: 0.8rem; color: #94a3b8; margin-top: 5px; line-height: 1.4;
    }
    .sub-wants strong { color: #fbbf24; }
    .sub-date { font-size: 0.65rem; color: #475569; margin-top: 4px; }
    .sub-actions { flex-shrink: 0; }
    .sub-mail-btn {
      background: #334155; color: #94a3b8; border: 1px solid #475569;
      padding: 6px 12px; border-radius: 6px; cursor: pointer;
      font-size: 0.75rem; font-family: inherit; transition: all 0.15s;
      text-decoration: none; display: inline-block;
    }
    .sub-mail-btn:hover { background: #475569; color: #f8fafc; }
    .sub-mail-btn.replied { background: #065f46; color: #34d399; border-color: #059669; }
    .sub-mail-btn.replied:hover { background: #047857; color: #6ee7b7; }
    .sub-mark-btn {
      background: transparent; color: #475569; border: 1px solid #334155;
      padding: 6px 8px; border-radius: 6px; cursor: pointer;
      font-size: 0.7rem; font-family: inherit; transition: all 0.15s;
      margin-top: 6px; display: block; text-align: center; width: 100%;
    }
    .sub-mark-btn:hover { color: #94a3b8; border-color: #475569; }
    .sub-mark-btn.done { color: #34d399; border-color: #065f46; }
    .sub-mark-btn.done:hover { color: #f87171; border-color: #7f1d1d; }
    .sub-last-contact { font-size: 0.6rem; margin-top: 3px; }
    .sub-last-contact.fresh { color: #34d399; }
    .sub-last-contact.stale { color: #fbbf24; }
    .sub-last-contact.cold { color: #f87171; }
    .sub-email-count { font-size: 0.6rem; color: #475569; margin-top: 2px; }

    /* Drafts */
    .drafts-card {
      background: #1e293b; border: 2px solid #f59e0b; border-radius: 12px;
      padding: 20px; margin-bottom: 24px;
    }
    .drafts-card h2 { font-size: 0.85rem; font-weight: 600; color: #f59e0b; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
    .drafts-card .badge { background: #f59e0b; color: #0f172a; }
    .draft-item { padding: 16px; margin-bottom: 12px; background: #0f172a; border-radius: 10px; border: 1px solid #334155; }
    .draft-item:last-child { margin-bottom: 0; }
    .draft-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .draft-to { font-size: 0.85rem; font-weight: 600; color: #f8fafc; }
    .draft-type-badge { font-size: 0.6rem; padding: 3px 8px; border-radius: 4px; font-weight: 600; }
    .draft-type-badge.deal-alert { background: #065f46; color: #34d399; }
    .draft-type-badge.non-eu { background: #78350f; color: #fbbf24; }
    .draft-type-badge.weekly-digest { background: #4c1d95; color: #a78bfa; }
    .draft-subject { font-size: 0.75rem; color: #94a3b8; margin-bottom: 10px; font-style: italic; }
    .draft-deals { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .draft-deal-tag { font-size: 0.65rem; padding: 4px 8px; background: #1e3a5f; color: #38bdf8; border-radius: 4px; }
    .draft-deal-tag .price { color: #34d399; font-weight: 600; margin-left: 4px; }
    .draft-meta { font-size: 0.6rem; color: #475569; margin-bottom: 10px; }
    .draft-actions { display: flex; gap: 8px; }
    .draft-btn { padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-family: inherit; border: 1px solid; transition: all 0.15s; font-weight: 600; }
    .draft-btn.send { background: #065f46; color: #34d399; border-color: #059669; }
    .draft-btn.send:hover { background: #047857; }
    .draft-btn.preview { background: #1e3a5f; color: #38bdf8; border-color: #1d4ed8; }
    .draft-btn.preview:hover { background: #1d4ed8; color: #fff; }
    .draft-btn.dismiss { background: transparent; color: #f87171; border-color: #7f1d1d; }
    .draft-btn.dismiss:hover { background: #7f1d1d; color: #fca5a5; }
    .draft-preview-frame { margin-top: 10px; border: 1px solid #334155; border-radius: 8px; overflow: hidden; display: none; }
    .draft-preview-frame iframe { width: 100%; height: 400px; border: none; background: #fff; }

    /* Sent Log */
    .sent-card {
      background: #1e293b; border: 1px solid #334155; border-radius: 12px;
      padding: 20px; margin-bottom: 24px;
    }
    .sent-card h2 { font-size: 0.85rem; font-weight: 600; color: #94a3b8; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
    .sent-item { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid rgba(51, 65, 85, 0.2); font-size: 0.75rem; }
    .sent-item:last-child { border-bottom: none; }
    .sent-icon { width: 24px; text-align: center; flex-shrink: 0; }
    .sent-to { color: #f8fafc; font-weight: 500; min-width: 140px; }
    .sent-subject { color: #94a3b8; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sent-date { color: #475569; flex-shrink: 0; }
    .sent-type { font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
    .sent-type.welcome { background: #1e3a5f; color: #38bdf8; }
    .sent-type.deal-alert { background: #065f46; color: #34d399; }
    .sent-type.weekly-digest { background: #4c1d95; color: #a78bfa; }
    .sent-type.non-eu { background: #78350f; color: #fbbf24; }

    /* Cron trigger */
    .cron-btn {
      background: #334155; color: #94a3b8; border: 1px solid #475569;
      padding: 6px 14px; border-radius: 6px; cursor: pointer;
      font-size: 0.7rem; font-family: inherit; transition: all 0.15s;
    }
    .cron-btn:hover { background: #475569; color: #f8fafc; }

    .empty-state {
      text-align: center; padding: 60px 20px; color: #475569;
    }
    .empty-state h2 { color: #64748b; margin-bottom: 12px; }

    .loading {
      text-align: center; padding: 80px 20px; color: #475569; font-size: 1rem;
    }
    .loading .spinner {
      display: inline-block; width: 28px; height: 28px;
      border: 3px solid #334155; border-top-color: #38bdf8;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin-bottom: 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      text-align: center; color: #1e293b; font-size: 0.7rem; margin-top: 32px;
      padding: 16px;
    }
    .footer a { color: #334155; text-decoration: none; }
  </style>
</head>
<body>

<div class="header">
  <h1>Mova<span>camper</span> + Relo<span>camp</span></h1>
  <div class="header-right">
    <span class="last-updated" id="lastUpdated"></span>
    <div class="period-select">
      <button class="period-btn" data-days="7">7d</button>
      <button class="period-btn active" data-days="14">14d</button>
      <button class="period-btn" data-days="30">30d</button>
      <button class="period-btn" data-days="90">90d</button>
    </div>
  </div>
</div>

<div id="content">
  <div class="loading"><div class="spinner"></div><div>Loading analytics...</div></div>
</div>

<div class="footer">
  Movacamper + Relocamp Dashboard &middot; <a href="/">Movacamper</a> &middot; <a href="https://relocamp.nl">Relocamp</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script>
// Token must be in URL: /dashboard?token=xxx
const urlToken = new URLSearchParams(window.location.search).get('token');
if (!urlToken) {
  document.body.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100vh;color:#64748b;font-family:Inter,sans-serif"><h2>Access denied</h2></div>';
  throw new Error('No token');
}
const TOKEN = urlToken;
let currentDays = 14;
let charts = {};

document.querySelectorAll('.period-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentDays = parseInt(btn.dataset.days);
    loadDashboard(currentDays);
  });
});

// Auto-exclude dashboard visitors from tracking
try { localStorage.setItem('movacamper_notrack', '1'); } catch(e) {}

async function loadDashboard(days) {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div><div>Loading analytics...</div></div>';

  try {
    const res = await fetch(`/api/stats?token=${TOKEN}&days=${days}`);
    const data = await res.json();
    if (data.error && !data.totals) {
      content.innerHTML = `<div class="empty-state"><h2>No data yet</h2><p>${data.error}</p></div>`;
      return;
    }
    document.getElementById('lastUpdated').textContent =
      'Updated ' + new Date(data.generated_at).toLocaleTimeString('en', { hour: '2-digit', minute: '2-digit' });
    renderDashboard(data);
    loadSubscribers();
  } catch (err) {
    content.innerHTML = `<div class="empty-state"><h2>Error</h2><p>${err.message}</p></div>`;
  }
}

// ─── TREND CALC ───
function calcTrend(timeseries, key) {
  if (timeseries.length < 4) return { pct: 0, cls: 'flat', label: '—' };
  const half = Math.floor(timeseries.length / 2);
  const first = timeseries.slice(0, half).reduce((s, d) => s + (d[key] || 0), 0);
  const second = timeseries.slice(half).reduce((s, d) => s + (d[key] || 0), 0);
  if (first === 0 && second === 0) return { pct: 0, cls: 'flat', label: '—' };
  if (first === 0) return { pct: 100, cls: 'new', label: 'new' };
  const pct = Math.round(((second - first) / first) * 100);
  if (pct > 5) return { pct, cls: 'up', label: `+${pct}%` };
  if (pct < -5) return { pct, cls: 'down', label: `${pct}%` };
  return { pct: 0, cls: 'flat', label: 'stable' };
}

// ─── INSIGHTS ENGINE ───
function generateInsights(data) {
  const { totals, timeseries, top_referrers, top_search_cities } = data;
  const insights = [];
  const days = timeseries.length;

  // Traffic trend
  const visTrend = calcTrend(timeseries, 'visitors');
  if (visTrend.cls === 'up') {
    insights.push({ icon: '📈', text: `Traffic is <strong>growing ${visTrend.label}</strong> — keep pushing content and SEO.`, type: 'good' });
  } else if (visTrend.cls === 'down') {
    insights.push({ icon: '📉', text: `Traffic is <strong>down ${visTrend.label}</strong> — consider promoting on Reddit or social media.`, type: 'warn' });
  } else if (totals.visitors === 0) {
    insights.push({ icon: '🚀', text: `<strong>No visitors yet</strong> — tracking just started. Data will build up automatically.`, type: 'info' });
  }

  // Conversion rate
  if (totals.visitors > 0 && totals.searches > 0) {
    const searchRate = Math.round((totals.searches / totals.visitors) * 100);
    if (searchRate > 50) {
      insights.push({ icon: '🎯', text: `<strong>${searchRate}%</strong> of visitors search — excellent engagement!`, type: 'good' });
    } else if (searchRate > 20) {
      insights.push({ icon: '🔍', text: `<strong>${searchRate}%</strong> of visitors search — solid conversion.`, type: 'info' });
    } else {
      insights.push({ icon: '⚡', text: `Only <strong>${searchRate}%</strong> search — try making the search bar more prominent.`, type: 'warn' });
    }
  }

  // Subscriber conversion
  if (totals.subscribes > 0) {
    insights.push({ icon: '🔔', text: `<strong>${totals.subscribes} new subscriber${totals.subscribes > 1 ? 's' : ''}</strong> this period — the alerts feature is working.`, type: 'good' });
  } else if (totals.visitors > 20 && totals.subscribes === 0) {
    insights.push({ icon: '💡', text: `<strong>0 new subscribers</strong> despite ${totals.visitors} visitors — consider A/B testing the subscribe CTA.`, type: 'warn' });
  }

  // Top referrer
  if (top_referrers.length > 0 && top_referrers[0].source !== 'direct') {
    insights.push({ icon: '🌐', text: `Top traffic source: <strong>${top_referrers[0].source}</strong> (${top_referrers[0].count} visits).`, type: 'info' });
  } else if (top_referrers.length > 0 && top_referrers[0].source === 'direct') {
    insights.push({ icon: '📱', text: `Most traffic is <strong>direct</strong> — try building organic/referral channels.`, type: 'warn' });
  }

  // Top city
  if (top_search_cities.length > 0) {
    insights.push({ icon: '🏙️', text: `Most searched city: <strong>${top_search_cities[0].city}</strong> (${top_search_cities[0].count}x). Make sure deals from there are fresh.`, type: 'info' });
  }

  // Pages per visitor (bounce-like)
  if (totals.avg_pages_per_visitor >= 2) {
    insights.push({ icon: '✅', text: `<strong>${totals.avg_pages_per_visitor} pages/visit</strong> — visitors are exploring. Low bounce rate!`, type: 'good' });
  } else if (totals.avg_pages_per_visitor > 0 && totals.avg_pages_per_visitor < 1.3) {
    insights.push({ icon: '🚪', text: `<strong>${totals.avg_pages_per_visitor} pages/visit</strong> — high bounce. Add more internal links and CTAs.`, type: 'bad' });
  }

  return insights.slice(0, 4); // max 4
}

// ─── SPARKLINE ───
function miniSparkSVG(data, color) {
  if (!data || data.length < 2) return '';
  const max = Math.max(...data, 1);
  const w = 200, h = 32;
  const points = data.map((v, i) => `${(i / (data.length - 1)) * w},${h - (v / max) * h}`).join(' ');
  return `<svg class="kpi-sparkline" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polyline points="${points}" fill="none" stroke="${color}" stroke-width="2"/>
    <polygon points="0,${h} ${points} ${w},${h}" fill="${color}" opacity="0.3"/>
  </svg>`;
}

function renderCountryTable(countries) {
  if (!countries || countries.length === 0) return '';
  countries.sort((a, b) => b.count - a.count);
  const maxVal = Math.max(...countries.map(c => c.count));
  return countries.slice(0, 10).map((c, i) => {
    const pct = Math.max(8, (c.count / maxVal) * 100);
    const flag = COUNTRY_FLAGS[c.country] || '🌍';
    const name = COUNTRY_NAMES[c.country] || c.country;
    return `<div class="stat-row">
      <span class="stat-rank">${flag}</span>
      <div class="stat-bar-bg">
        <div class="stat-bar-fill" style="width:${pct}%;background:#fbbf24;opacity:0.2"></div>
        <span class="stat-bar-label">${name}</span>
      </div>
      <span class="stat-count">${c.count}</span>
    </div>`;
  }).join('');
}

function renderBarTable(items, labelKey, valueKey, color) {
  if (!items || items.length === 0) {
    return '<div style="color:#475569;font-size:0.8rem;padding:12px 0">No data yet</div>';
  }
  const maxVal = Math.max(...items.map(i => i[valueKey]));
  return items.slice(0, 8).map((item, i) => {
    const pct = Math.max(8, (item[valueKey] / maxVal) * 100);
    return `<div class="stat-row">
      <span class="stat-rank">${i + 1}</span>
      <div class="stat-bar-bg">
        <div class="stat-bar-fill" style="width:${pct}%;background:${color};opacity:0.2"></div>
        <span class="stat-bar-label">${item[labelKey]}</span>
      </div>
      <span class="stat-count">${item[valueKey].toLocaleString()}</span>
    </div>`;
  }).join('');
}

      if (sub.lastEmailed) {
        const daysSince = Math.floor((Date.now() - new Date(sub.lastEmailed)) / (1000 * 60 * 60 * 24));
        const cls = daysSince <= 7 ? 'fresh' : daysSince <= 14 ? 'stale' : 'cold';
        const icon = daysSince <= 7 ? '●' : daysSince <= 14 ? '◐' : '○';
        lastContactHtml = `<div class="sub-last-contact ${cls}">${icon} Last emailed ${daysSince}d ago</div>`;
      }
      const emailCountHtml = sub.emailCount ? `<div class="sub-email-count">📧 ${sub.emailCount} email${sub.emailCount > 1 ? 's' : ''} sent</div>` : '';

      return `<div class="sub-item">
        <div class="sub-avatar">${initial}</div>
        <div class="sub-info">
          <div class="sub-email">${sub.email}</div>
          <div class="sub-wants">${wants}</div>
          <div class="sub-date">Subscribed ${created}</div>
          ${lastContactHtml}${emailCountHtml}
        </div>
        <div class="sub-actions">
          <a href="${gmailUrl}" target="_blank" class="${btnClass}">${btnLabel}</a>
          <button class="${markClass}" onclick="markReplied('${sub.email}', this)">${markLabel}</button>
        </div>
      </div>`;
    }).join('');
  } catch (err) {
    list.innerHTML = `<div style="color:#f87171;font-size:0.8rem">Error loading subscribers: ${err.message}</div>`;
  }
}

// ─── MARK REPLIED ───
async function markReplied(email, btn) {
  btn.disabled = true;
  btn.textContent = '...';
  try {
    const res = await fetch(`/api/stats?token=${TOKEN}&email=${encodeURIComponent(email)}`, { method: 'PATCH' });
    const data = await res.json();
    if (data.ok) {
      await loadSubscribers();
    } else {
      btn.textContent = 'Error';
      setTimeout(() => { btn.textContent = 'Retry'; btn.disabled = false; }, 2000);
    }
  } catch (err) {
    btn.textContent = 'Error';
    setTimeout(() => { btn.textContent = 'Retry'; btn.disabled = false; }, 2000);
  }
}

// ─── DRAFTS ───
async function loadDrafts() {
  const card = document.getElementById('draftsCard');
  const list = document.getElementById('draftsList');
  const badge = document.getElementById('draftsBadge');
  if (!card || !list) return;

  try {
    const res = await fetch(`/api/stats?token=${TOKEN}&action=drafts`);
    const data = await res.json();
    const drafts = data.drafts || [];

    const noDraftsCard = document.getElementById('noDraftsCard');
    if (drafts.length === 0) {
      card.style.display = 'none';
      if (noDraftsCard) noDraftsCard.style.display = 'block';
      return;
    }

    card.style.display = 'block';
    if (noDraftsCard) noDraftsCard.style.display = 'none';
    badge.textContent = drafts.length;

    list.innerHTML = drafts.map((d, idx) => {
      const typeClass = (d.type || 'deal-alert').replace(/\s+/g, '-');
      const typeLabel = d.type === 'non-eu' ? '🌏 Non-EU' : d.type === 'weekly-digest' ? '📰 Digest' : '🎯 Deal Alert';
      const created = d.created ? new Date(d.created).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }) : '';

      // Deal tags
      let dealsHtml = '';
      if (d.deals && d.deals.length > 0) {
        dealsHtml = '<div class="draft-deals">' + d.deals.map(deal =>
          `<span class="draft-deal-tag">${deal.from} → ${deal.to} <span class="price">${deal.price}</span></span>`
        ).join('') + '</div>';
      } else if (d.type === 'non-eu') {
        dealsHtml = '<div class="draft-deals"><span class="draft-deal-tag" style="background:#78350f;color:#fbbf24">Europe only — subscriber from ' + (d.city || 'non-EU') + '</span></div>';
      }

      return `<div class="draft-item" id="draft-${idx}">
        <div class="draft-header">
          <div class="draft-to">📧 ${d.to}</div>
          <span class="draft-type-badge ${typeClass}">${typeLabel}</span>
        </div>
        <div class="draft-subject">Subject: "${d.subject || 'Welcome'}"</div>
        ${dealsHtml}
        <div class="draft-meta">Created ${created}${d.matchCount ? ' · ' + d.matchCount + ' deals matched' : ''}</div>
        <div class="draft-actions">
          <button class="draft-btn send" onclick="sendDraft('${d.to}', this)">✅ Approve & Send</button>
          <button class="draft-btn preview" onclick="togglePreview(${idx})">👁 Preview email</button>
          <button class="draft-btn dismiss" onclick="dismissDraft('${d.to}', this)">✕ Dismiss</button>
        </div>
        <div class="draft-preview-frame" id="preview-${idx}">
          <iframe srcdoc="${(d.html || '<p>No preview available</p>').replace(/"/g, '&quot;')}"></iframe>
        </div>
      </div>`;
    }).join('');
  } catch (err) {
    card.style.display = 'none';
  }
}

function togglePreview(idx) {
  const frame = document.getElementById('preview-' + idx);
  if (!frame) return;
  frame.style.display = frame.style.display === 'none' ? 'block' : 'none';
}

async function sendDraft(email, btn) {
  if (!confirm(`Send email to ${email}? This will deliver the email via frank@movacamper.com.`)) return;
  btn.disabled = true; btn.textContent = '⏳ Sending...';
  try {
    const res = await fetch(`/api/stats?token=${TOKEN}&action=send-draft&email=${encodeURIComponent(email)}`, { method: 'POST' });
    const data = await res.json();
    if (data.ok && data.sent) {
      btn.textContent = '✅ Sent!';
      setTimeout(async () => { await loadDrafts(); await loadSentLog(); await loadSubscribers(); }, 1000);
    } else {
      btn.textContent = '❌ ' + (data.reason || 'Failed');
      setTimeout(() => { btn.textContent = '✅ Approve & Send'; btn.disabled = false; }, 3000);
    }
  } catch (err) {
    btn.textContent = '❌ Error';
    setTimeout(() => { btn.textContent = '✅ Approve & Send'; btn.disabled = false; }, 3000);
  }
}

async function dismissDraft(email, btn) {
  if (!confirm(`Dismiss draft for ${email}? The subscriber won't receive this email.`)) return;
  btn.disabled = true; btn.textContent = '...';
  try {
    const res = await fetch(`/api/stats?token=${TOKEN}&action=dismiss-draft&email=${encodeURIComponent(email)}`, { method: 'POST' });
    const data = await res.json();
    if (data.ok) await loadDrafts();
  } catch { btn.textContent = 'Error'; }
}

// ─── SENT LOG ───
async function loadSentLog() {
  const list = document.getElementById('sentList');
  const badge = document.getElementById('sentBadge');
  if (!list) return;

  try {
    const res = await fetch(`/api/stats?token=${TOKEN}&action=sent-log&limit=20`);
    const data = await res.json();
    const log = data.log || [];

    badge.textContent = log.length;

    if (log.length === 0) {
      list.innerHTML = '<div style="color:#475569;font-size:0.8rem;padding:8px 0">No emails sent yet. Click "Run deal matcher" to trigger the first batch.</div>';
      return;
    }

    list.innerHTML = log.map(entry => {
      const typeClass = (entry.type || 'welcome').replace(/\s+/g, '-');
      const icon = entry.type === 'deal-alert' ? '🎯' : entry.type === 'weekly-digest' ? '📰' : entry.type === 'non-eu' ? '🌏' : '👋';
      const date = entry.sentAt ? new Date(entry.sentAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }) : '';
      const deals = entry.deals ? ` (${entry.deals} deals)` : '';
      return `<div class="sent-item">
        <span class="sent-icon">${icon}</span>
        <span class="sent-to">${entry.to}</span>
        <span class="sent-subject">${entry.subject || ''}${deals}</span>
        <span class="sent-type ${typeClass}">${entry.type || 'welcome'}</span>
        <span class="sent-date">${date}</span>
      </div>`;
    }).join('');
  } catch (err) {
    list.innerHTML = `<div style="color:#f87171;font-size:0.8rem">Error: ${err.message}</div>`;
  }
}

// ─── TRIGGER CRON MANUALLY ───
async function triggerCron(btn) {
  btn.disabled = true;
  btn.textContent = '⏳ Running...';
  try {
    const res = await fetch(`/api/cron/match-subscribers?token=${TOKEN}`);
    const data = await res.json();
    if (data.ok) {
      btn.textContent = `✓ Done: ${data.results.drafts} drafts created, ${data.results.skipped} skipped`;
      await loadDrafts();
      await loadSentLog();
      await loadSubscribers();
      setTimeout(() => { btn.textContent = '⚡ Run deal matcher now'; btn.disabled = false; }, 5000);
    } else {
      btn.textContent = 'Error: ' + (data.reason || data.error || 'unknown');
      setTimeout(() => { btn.textContent = '⚡ Run deal matcher now'; btn.disabled = false; }, 3000);
    }
  } catch (err) {
    btn.textContent = 'Error';
    setTimeout(() => { btn.textContent = '⚡ Run deal matcher now'; btn.disabled = false; }, 3000);
  }
}

// Load all sections
loadDrafts();
loadSentLog();

loadDashboard(currentDays);
</script>
